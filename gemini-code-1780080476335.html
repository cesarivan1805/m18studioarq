<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M18 Studio | Registro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-900 text-stone-100 font-sans">
    <nav class="p-6 border-b border-white/10">
        <span class="text-2xl tracking-widest font-light">M18 STUDIO</span>
    </nav>

    <main class="h-screen flex items-center justify-center px-4">
        <div class="bg-white/5 p-8 rounded-lg border border-white/10 w-full max-w-md shadow-2xl">
            <h2 class="text-2xl mb-6 text-center italic font-serif text-amber-500">Crear Cuenta</h2>
            <div class="space-y-4">
                <input type="email" id="email" placeholder="Tu correo electrónico" class="w-full p-4 bg-stone-800 border border-white/10 rounded outline-none focus:border-amber-500 transition">
                <input type="password" id="password" placeholder="Contraseña (mínimo 6 caracteres)" class="w-full p-4 bg-stone-800 border border-white/10 rounded outline-none focus:border-amber-500 transition">
                <button id="btn-register" class="w-full bg-amber-600 text-stone-900 py-4 font-bold uppercase tracking-widest hover:bg-amber-500 transition">Registrarse</button>
            </div>
            <p id="mensaje" class="mt-4 text-center text-sm text-amber-200/50"></p>
        </div>
    </main>

    <script type="module" src="script.js"></script>
</body>
</html>
